<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style id="__om-edit-overrides"></style>
  <style>
    body { margin: 0; background: #F5F1E6; }
    a { color: #D0006F; text-decoration: none; }
    a:hover { color: #F47216; }
  </style>
</helmet>

<div style="font-family:'Poppins',sans-serif;">
  <nav style="position:relative; max-width:1180px; margin:0 auto; background:#FFFFFF; border-radius:999px; box-shadow:0 10px 30px rgba(43,35,32,0.12); padding:12px 16px 12px 20px; display:flex; align-items:center; justify-content:space-between; gap:16px;">

    <div style="display:flex; align-items:center; gap:12px;">
      <div style="position:relative; width:44px; height:44px; border-radius:50%; background:#D0006F; box-shadow:inset 0 -3px 0 rgba(0,0,0,0.12);">
        <div style="position:absolute; top:50%; left:50%; width:16px; height:16px; border-radius:50%; background:#F5F1E6; transform:translate(-50%,-50%);"></div>
        <div style="position:absolute; top:8px; left:12px; width:5px; height:2px; border-radius:2px; background:#F47216; transform:rotate(30deg);"></div>
        <div style="position:absolute; top:14px; left:28px; width:5px; height:2px; border-radius:2px; background:#FFFFFF; transform:rotate(-20deg);"></div>
        <div style="position:absolute; top:28px; left:10px; width:5px; height:2px; border-radius:2px; background:#FFFFFF; transform:rotate(60deg);"></div>
        <div style="position:absolute; top:30px; left:24px; width:5px; height:2px; border-radius:2px; background:#F47216; transform:rotate(-45deg);"></div>
        <div style="position:absolute; top:20px; left:6px; width:5px; height:2px; border-radius:2px; background:#2B2320; opacity:0.3; transform:rotate(10deg);"></div>
      </div>
      <span style="font-family:'Baloo 2',sans-serif; font-weight:800; text-transform:uppercase; font-size:22px; letter-spacing:0.01em; color:#D0006F;">DonutLab</span>
    </div>

    <sc-if value="{{ isDesktop }}" hint-placeholder-val="{{ true }}">
      <div style="display:flex; align-items:center; gap:36px;">
        <sc-for list="{{ navItems }}" as="item" hint-placeholder-count="4">
          <a href="{{ item.href }}" style="font-family:'Baloo 2',sans-serif; font-weight:700; text-transform:uppercase; font-size:14px; letter-spacing:0.03em; color:#D0006F; padding-bottom:4px; border-bottom:2px solid transparent; white-space:nowrap;" style-hover="border-bottom:2px solid #D0006F;">{{ item.label }}</a>
        </sc-for>
      </div>
    </sc-if>

    <sc-if value="{{ isDesktop }}" hint-placeholder-val="{{ true }}">
      <button style="font-family:'Baloo 2',sans-serif; font-weight:700; text-transform:uppercase; font-size:14px; letter-spacing:0.02em; color:#FFFFFF; background:#F47216; border:none; border-radius:999px; padding:14px 28px; box-shadow:0 8px 18px rgba(244,114,22,0.35); cursor:pointer; white-space:nowrap;" style-hover="background:#dd6512;">Donut erstellen</button>
    </sc-if>

    <sc-if value="{{ isMobile }}" hint-placeholder-val="{{ false }}">
      <button onClick="{{ toggleMenu }}" aria-label="Menü" style="width:44px; height:44px; border-radius:50%; background:#F5F1E6; border:none; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; cursor:pointer; flex-shrink:0;">
        <span style="width:20px; height:2px; background:#2B2320; border-radius:2px;"></span>
        <span style="width:20px; height:2px; background:#2B2320; border-radius:2px;"></span>
        <span style="width:20px; height:2px; background:#2B2320; border-radius:2px;"></span>
      </button>
    </sc-if>
  </nav>

  <sc-if value="{{ showMobilePanel }}" hint-placeholder-val="{{ false }}">
    <div style="max-width:1180px; margin:12px auto 0; background:#FFFFFF; border-radius:24px; box-shadow:0 10px 30px rgba(43,35,32,0.12); padding:20px; display:flex; flex-direction:column; gap:8px;">
      <sc-for list="{{ navItems }}" as="mitem" hint-placeholder-count="4">
        <a href="{{ mitem.href }}" style="font-family:'Baloo 2',sans-serif; font-weight:700; text-transform:uppercase; font-size:15px; letter-spacing:0.03em; color:#D0006F; padding:12px 8px; border-bottom:1px solid #F0EBDF;">{{ mitem.label }}</a>
      </sc-for>
      <button style="margin-top:8px; font-family:'Baloo 2',sans-serif; font-weight:700; text-transform:uppercase; font-size:14px; color:#FFFFFF; background:#F47216; border:none; border-radius:999px; padding:14px 28px; box-shadow:0 8px 18px rgba(244,114,22,0.35); cursor:pointer;">Donut erstellen</button>
    </div>
  </sc-if>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { width: 1280, mobileOpen: false };

  componentDidMount() {
    this.updateWidth = () => this.setState({ width: window.innerWidth });
    window.addEventListener('resize', this.updateWidth);
    this.updateWidth();
  }

  componentWillUnmount() {
    window.removeEventListener('resize', this.updateWidth);
  }

  renderVals() {
    const isMobile = this.state.width < 1024;
    return {
      isMobile,
      isDesktop: !isMobile,
      showMobilePanel: isMobile && this.state.mobileOpen,
      toggleMenu: () => this.setState(s => ({ mobileOpen: !s.mobileOpen })),
      navItems: [
        { label: 'Konfigurator', href: '#konfigurator' },
        { label: 'Meine Kreationen', href: '#kreationen' },
        { label: 'Inspiration', href: '#inspiration' },
        { label: 'Über uns', href: '#ueber-uns' },
      ],
    };
  }
}
</script>
</body>
</html>
