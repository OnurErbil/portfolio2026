<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style id="__om-edit-overrides"></style>
  <style>
    body { margin: 0; background: #F5F1E6; }
    select { -webkit-appearance:none; appearance:none; }
  </style>
</helmet>

<div style="min-height:100vh; background:#F5F1E6; font-family:'Poppins',sans-serif; color:#2B2320; padding:24px 24px 80px;">

  <div style="max-width:1400px; margin:0 auto 28px;">
    <dc-import name="Top Navigation" hint-size="100%,72px"></dc-import>
  </div>

  <div style="max-width:1400px; margin:0 auto;">

    <div style="display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap; margin-bottom:32px;">
      <h1 style="font-family:'Fredoka',sans-serif; font-weight:700; text-transform:uppercase; font-size:36px; margin:0; letter-spacing:0.01em;">
        <span style="color:#F47216;">Meine</span> <span style="color:#D0006F;">Kreationen</span>
      </h1>
      <sc-if value="{{ hasCreations }}" hint-placeholder-val="{{ true }}">
        <div style="position:relative;">
          <select onChange="{{ onSortChange }}" value="{{ sortBy }}" style="font-family:'Poppins'; font-weight:600; font-size:13px; color:#2B2320; background:#FFFFFF; border:none; border-radius:999px; padding:11px 40px 11px 18px; box-shadow:0 6px 16px rgba(43,35,32,0.08); cursor:pointer;">
            <option value="newest">Neueste zuerst</option>
            <option value="alpha">Alphabetisch</option>
          </select>
          <span style="position:absolute; top:50%; right:16px; transform:translateY(-50%); font-size:11px; color:#D0006F; pointer-events:none;">▼</span>
        </div>
      </sc-if>
    </div>

    <sc-if value="{{ hasCreations }}" hint-placeholder-val="{{ true }}">
      <div style="display:grid; grid-template-columns:{{ gridColumns }}; gap:24px;">
        <sc-for list="{{ creations }}" as="item" hint-placeholder-count="6">
          <div onMouseEnter="{{ item.onEnter }}" onMouseLeave="{{ item.onLeave }}" style="position:relative; background:#FFFFFF; border-radius:20px; box-shadow:{{ item.shadow }}; padding:18px; display:flex; flex-direction:column; gap:12px; transform:{{ item.transform }}; transition:transform 0.18s, box-shadow 0.18s;">

            <div style="position:relative; background:#F5F1E6; border-radius:16px; height:160px; display:flex; align-items:center; justify-content:center; overflow:hidden;">
              <div style="position:relative; width:96px; height:96px; filter:drop-shadow(0 10px 16px rgba(43,35,32,0.18));">
                <div style="width:100%; height:100%; border-radius:50%; background:{{ item.icingColor }};"></div>
                <div style="position:absolute; top:50%; left:50%; width:34%; height:34%; border-radius:50%; background:{{ item.doughColor }}; transform:translate(-50%,-50%);"></div>
                <sc-for list="{{ item.sprinkles }}" as="sp" hint-placeholder-count="4">
                  <div style="position:absolute; top:{{ sp.top }}; left:{{ sp.left }}; width:9px; height:4px; border-radius:2px; background:{{ sp.color }}; transform:rotate({{ sp.rot }});"></div>
                </sc-for>
              </div>

              <div style="position:absolute; inset:0; background:rgba(43,35,32,0.42); display:flex; align-items:center; justify-content:center; gap:14px; opacity:{{ item.overlayOpacity }}; transition:opacity 0.15s;">
                <button style="width:40px; height:40px; border-radius:50%; border:none; background:#FFFFFF; color:#2B2320; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(0,0,0,0.2);">✎</button>
                <button style="width:40px; height:40px; border-radius:50%; border:none; background:#FFFFFF; color:#D0006F; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(0,0,0,0.2);">🗑</button>
              </div>
            </div>

            <div>
              <div style="font-family:'Fredoka',sans-serif; font-weight:600; font-size:16px; color:#2B2320;">{{ item.name }}</div>
              <div style="font-family:'Poppins'; font-size:12px; color:#8a7f74; margin-top:2px;">{{ item.desc }}</div>
            </div>

            <sc-if value="{{ item.hasBadges }}" hint-placeholder-val="{{ false }}">
              <div style="display:flex; gap:6px; flex-wrap:wrap;">
                <sc-if value="{{ item.vegan }}" hint-placeholder-val="{{ false }}">
                  <span style="font-family:'Poppins'; font-size:11px; font-weight:600; color:#3d7a4d; background:#E3F0E6; border-radius:999px; padding:4px 10px;">🌱 Vegan</span>
                </sc-if>
                <sc-if value="{{ item.glutenfrei }}" hint-placeholder-val="{{ false }}">
                  <span style="font-family:'Poppins'; font-size:11px; font-weight:600; color:#8a6a1f; background:#FBF3DA; border-radius:999px; padding:4px 10px;">🌾 Glutenfrei</span>
                </sc-if>
              </div>
            </sc-if>
          </div>
        </sc-for>
      </div>
    </sc-if>

    <sc-if value="{{ hasCreations }}" hint-placeholder-val="{{ true }}">
    </sc-if>
    <sc-if value="{{ showEmpty }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex; flex-direction:column; align-items:center; text-align:center; padding:80px 24px; background:#FFFFFF; border-radius:24px; box-shadow:0 6px 18px rgba(43,35,32,0.07);">
        <div style="position:relative; width:110px; height:110px; margin-bottom:20px; opacity:0.5;">
          <div style="width:100%; height:100%; border-radius:50%; border:10px dashed #e4d9c1;"></div>
          <div style="position:absolute; top:50%; left:50%; font-size:32px; transform:translate(-50%,-50%);">🍩</div>
        </div>
        <h3 style="font-family:'Fredoka',sans-serif; font-weight:600; font-size:20px; margin:0 0 8px; color:#2B2320;">Noch keine Donuts erstellt – leg los!</h3>
        <p style="font-family:'Poppins'; font-size:14px; color:#8a7f74; margin:0 0 20px; max-width:320px;">Deine gespeicherten Kreationen erscheinen hier, sobald du deinen ersten Donut zusammengestellt hast.</p>
        <a href="#konfigurator" style="font-family:'Fredoka',sans-serif; font-weight:600; text-transform:uppercase; font-size:14px; color:#FFFFFF; background:#F47216; border-radius:999px; padding:14px 32px; box-shadow:0 8px 18px rgba(244,114,22,0.35);">Zum Konfigurator</a>
      </div>
    </sc-if>

  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1400,&quot;height&quot;:900},&quot;emptyState&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Zustand&quot;}}">
class Component extends DCLogic {
  state = { width: 1280, sortBy: 'newest', hoverId: null };

  componentDidMount() {
    this.updateWidth = () => this.setState({ width: window.innerWidth });
    window.addEventListener('resize', this.updateWidth);
    this.updateWidth();
  }
  componentWillUnmount() { window.removeEventListener('resize', this.updateWidth); }

  renderVals() {
    const s = this.state;
    const emptyOverride = this.props.emptyState ?? false;

    const raw = [
      { id: 1, name: 'Erdbeer-Traum #3', desc: 'Klassisch rund · Erdbeere', icingColor: '#D0006F', doughColor: '#E8C177', vegan: false, glutenfrei: false, createdAt: 6 },
      { id: 2, name: 'Schoko-Kick', desc: 'Ring mit Twist · Schokolade', icingColor: '#4B2E1A', doughColor: '#6B4226', vegan: false, glutenfrei: true, createdAt: 5 },
      { id: 3, name: 'Karamell-Traum', desc: 'Klassisch rund · Karamell', icingColor: '#C97B2E', doughColor: '#E8C177', vegan: false, glutenfrei: false, createdAt: 4 },
      { id: 4, name: 'Green Vibes', desc: 'Vegan-Teig · Minze', icingColor: '#7FD1AE', doughColor: '#F3E4C0', vegan: true, glutenfrei: false, createdAt: 3 },
      { id: 5, name: 'Zitronen-Frische', desc: 'Mini-Donuts · Zitrone', icingColor: '#F5D95E', doughColor: '#E8C177', vegan: false, glutenfrei: false, createdAt: 2 },
      { id: 6, name: 'Berry Blast', desc: 'Länglich/Bar · Erdbeere', icingColor: '#D0006F', doughColor: '#8a5a2b', vegan: true, glutenfrei: true, createdAt: 1 },
    ];

    const sprinklePool = [
      { top: '15%', left: '25%', rot: '15deg' }, { top: '20%', left: '65%', rot: '-25deg' },
      { top: '65%', left: '20%', rot: '10deg' }, { top: '68%', left: '65%', rot: '40deg' },
    ];

    let sorted = [...raw];
    if (s.sortBy === 'alpha') sorted.sort((a, b) => a.name.localeCompare(b.name));
    else sorted.sort((a, b) => b.createdAt - a.createdAt);

    const creations = sorted.map(c => ({
      ...c,
      sprinkles: sprinklePool.map(p => ({ ...p, color: c.icingColor === '#F5D95E' ? '#8a5a2b' : '#F5D95E' })),
      hasBadges: c.vegan || c.glutenfrei,
      overlayOpacity: s.hoverId === c.id ? 1 : 0,
      shadow: s.hoverId === c.id ? '0 16px 32px rgba(43,35,32,0.18)' : '0 6px 18px rgba(43,35,32,0.07)',
      transform: s.hoverId === c.id ? 'translateY(-4px) scale(1.02)' : 'none',
      onEnter: () => this.setState({ hoverId: c.id }),
      onLeave: () => this.setState({ hoverId: null }),
    }));

    const columnsMap = s.width >= 1100 ? 'repeat(4,1fr)' : s.width >= 700 ? 'repeat(2,1fr)' : '1fr';

    return {
      hasCreations: !emptyOverride,
      showEmpty: emptyOverride,
      creations,
      gridColumns: columnsMap,
      sortBy: s.sortBy,
      onSortChange: (e) => this.setState({ sortBy: e.target.value }),
    };
  }
}
</script>
</body>
</html>
